<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @page { margin: 1in; size: letter; }
  body { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 11pt; line-height: 1.5; color: #333; max-width: 7in; margin: 0 auto; }
  h1 { font-size: 18pt; margin: 0 0 4px 0; color: #222; }
  h2 { font-size: 13pt; margin: 28px 0 8px 0; border-bottom: 1px solid #ddd; padding-bottom: 4px; color: #444; }
  h3 { font-size: 11pt; margin: 20px 0 6px 0; color: #555; }
  table { width: 100%; border-collapse: collapse; margin: 12px 0; }
  th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left; font-size: 10pt; }
  th { background: #f5f5f5; font-weight: 600; }
  .meta { color: #666; font-size: 10pt; margin-bottom: 20px; }
  .meta p { margin: 2px 0; }
  .field-row { margin: 4px 0; }
  .field-row strong { display: inline-block; min-width: 160px; }
  .signature-line { margin-top: 48px; border-top: 1px solid #333; width: 250px; padding-top: 4px; font-size: 10pt; color: #666; }
  .text-block { margin: 8px 0; text-align: justify; }
</style>
</head>
<body>
{% block content %}{% endblock %}
</body>
</html>
