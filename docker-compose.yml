# Paperless Ag - Local Development Stack
#
# This runs a stock Paperless NGX instance with pgvector-enabled Postgres.
# Use this for local development of the companion app container.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f        (watch logs)
#   docker compose down            (stop everything)
#   docker compose down -v         (stop and delete all data)

services:
  # PostgreSQL with pgvector extension pre-installed
  # This is a drop-in replacement for stock Postgres
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: paperless-dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperless"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - required by Paperless NGX for Celery task queue
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Stock Paperless NGX - no modifications
  paperless-webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - paperless-data:/usr/src/paperless/data
      - paperless-media:/usr/src/paperless/media
      - paperless-export:/usr/src/paperless/export
      - paperless-consume:/usr/src/paperless/consume
    environment:
      PAPERLESS_REDIS: redis://redis:6379
      PAPERLESS_DBHOST: db
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: paperless-dev
      PAPERLESS_OCR_LANGUAGE: eng
      PAPERLESS_TIME_ZONE: America/Chicago
      PAPERLESS_URL: http://localhost:8000
      # Create admin account on first run
      PAPERLESS_ADMIN_USER: admin
      PAPERLESS_ADMIN_PASSWORD: admin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Companion app container - semantic search + MCP server
  app:
    build:
      context: ./app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      paperless-webserver:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      PAPERLESS_API_URL: http://paperless-webserver:8000
      PAPERLESS_USERNAME: admin
      PAPERLESS_PASSWORD: admin
      DATABASE_URL: postgresql://paperless:paperless-dev@db:5432/paperless
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      SYNC_INTERVAL_SECONDS: "60"
      MCP_HTTP_PORT: "3001"
      FASTMCP_PORT: "3001"
      FASTMCP_HOST: "0.0.0.0"
      PYTHONUNBUFFERED: "1"

volumes:
  pgdata:
  redisdata:
  paperless-data:
  paperless-media:
  paperless-export:
  paperless-consume:
